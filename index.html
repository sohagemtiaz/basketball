<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Squada+One&display=swap" rel="stylesheet">
</head>

<body>
    <div class="scoreboard-container">
        <!-- Home Section -->
        <div class="team-section">
            <h1 class="team-name">HOME</h1>
            <div class="score-box">
                <div class="score-grid-overlay"></div>
                <div class="score" id="home-score">0</div>
            </div>
            <div class="controls">
                <button class="score-btn" onclick="addScore('home', 1)">+1</button>
                <button class="score-btn" onclick="addScore('home', 2)">+2</button>
                <button class="score-btn" onclick="addScore('home', 3)">+3</button>
            </div>
        </div>

        <!-- Divider -->
        <div class="center-divider"></div>

        <!-- Guest Section -->
        <div class="team-section">
            <h1 class="team-name">GUEST</h1>
            <div class="score-box">
                <div class="score-grid-overlay"></div>
                <div class="score" id="guest-score">0</div>
            </div>
            <div class="controls">
                <button class="score-btn" onclick="addScore('guest', 1)">+1</button>
                <button class="score-btn" onclick="addScore('guest', 2)">+2</button>
                <button class="score-btn" onclick="addScore('guest', 3)">+3</button>
            </div>
        </div>

        <!-- Reset Button -->
        <div class="reset-section">
            <button class="reset-btn" id="reset-btn" onclick="resetGame()">🔄</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
